<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER GOMOKU - 赛博朋克五子棋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ========== Reset Styles ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== Body Styles ========== */
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #0a0a0f;
            color: #00ff9d;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== Scanline Effect ========== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* ========== Container ========== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ========== Header Styles ========== */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
            margin-bottom: 10px;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }

        .subtitle {
            color: #00ffff;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ========== Game Wrapper ========== */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* ========== Control Panel ========== */
        .control-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            min-width: 220px;
            padding: 20px;
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid #ff00ff;
            box-shadow:
                0 0 20px rgba(255, 0, 255, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        /* ========== Difficulty Selector ========== */
        .difficulty-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .diff-btn {
            font-family: 'Share Tech Mono', monospace;
            padding: 10px 20px;
            border: 1px solid #ff00ff;
            background: transparent;
            color: #ff00ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .diff-btn:hover {
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            text-shadow: 0 0 10px #ff00ff;
        }

        .diff-btn.active {
            background: #00ffff;
            color: #0a0a0f;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* ========== Status Bar ========== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 10px 15px;
            border: 1px solid #00ffff;
            background: rgba(10, 10, 15, 0.9);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .status-bar .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-bar .player-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid currentColor;
        }

        .status-bar .turn-indicator {
            color: #ffff00;
        }

        .turn-text {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ========== Action Buttons ========== */
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            font-family: 'Share Tech Mono', monospace;
            padding: 8px 25px;
            border: 1px solid #00ffff;
            background: transparent;
            color: #00ffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #00ffff;
            color: #0a0a0f;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* ========== Board Container ========== */
        .board-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board-container::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            border-radius: 8px;
            z-index: -1;
            filter: blur(15px);
            opacity: 0.5;
            animation: neon-pulse 2s ease-in-out infinite alternate;
        }

        @keyframes neon-pulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px);
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid transparent;
            border-image: linear-gradient(135deg, #00ffff, #ff00ff) 1;
            box-shadow:
                0 0 30px rgba(0, 255, 255, 0.5),
                0 0 60px rgba(255, 0, 255, 0.3),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* ========== Board Cells ========== */
        .cell {
            width: 30px;
            height: 30px;
            border: 0.5px solid rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .cell:hover {
            background: rgba(0, 255, 255, 0.15);
        }

        .cell:hover::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.3);
        }

        /* ========== Pieces ========== */
        .piece {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            position: relative;
            animation: place-piece 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes place-piece {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .piece.black {
            background: radial-gradient(circle at 30% 30%, #555, #111 70%);
            box-shadow:
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.4),
                inset 0 0 5px rgba(255, 255, 255, 0.2);
        }

        .piece.black::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6), transparent);
            border-radius: 50%;
        }

        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc 70%);
            box-shadow:
                0 0 10px rgba(255, 0, 255, 0.8),
                0 0 20px rgba(255, 0, 255, 0.4),
                inset 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .piece.white::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9), transparent);
            border-radius: 50%;
        }

        /* ========== Win Line ========== */
        .win-line {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            box-shadow:
                0 0 10px #00ffff,
                0 0 20px #ff00ff;
            transform-origin: left center;
            animation: draw-line 0.5s ease-out forwards;
            z-index: 10;
            border-radius: 2px;
        }

        @keyframes draw-line {
            0% { transform: scaleX(0); opacity: 0; }
            100% { transform: scaleX(1); opacity: 1; }
        }

        /* ========== Modal ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fade-in 0.3s ease;
        }

        @keyframes fade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #0a0a0f;
            border: 2px solid #ff00ff;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow:
                0 0 50px rgba(255, 0, 255, 0.5),
                0 0 100px rgba(0, 255, 255, 0.3);
            animation: modal-glitch 0.5s ease-out;
        }

        @keyframes modal-glitch {
            0% {
                transform: translate(-2px, 2px) skewX(5deg);
                opacity: 0;
            }
            20% {
                transform: translate(2px, -2px) skewX(-5deg);
            }
            40% {
                transform: translate(-1px, 1px) skewX(2deg);
            }
            60% {
                transform: translate(1px, -1px) skewX(-2deg);
            }
            80% {
                transform: translate(-0.5px, 0.5px) skewX(1deg);
            }
            100% {
                transform: translate(0, 0) skewX(0deg);
                opacity: 1;
            }
        }

        .modal-content h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 2s ease-in-out infinite;
        }

        .modal-content p {
            margin-bottom: 25px;
            font-size: 1.2rem;
            color: #00ffff;
        }

        .modal-content button {
            font-family: 'Share Tech Mono', monospace;
            padding: 10px 30px;
            border: 2px solid #00ffff;
            background: transparent;
            color: #00ffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-content button:hover {
            background: #00ffff;
            color: #0a0a0f;
        }

        /* ========== Responsive Styles ========== */
        @media (max-width: 700px) {
            .game-wrapper {
                flex-direction: column-reverse;
                align-items: center;
            }

            .board {
                grid-template-columns: repeat(15, 22px);
                grid-template-rows: repeat(15, 22px);
            }

            .cell {
                width: 22px;
                height: 22px;
            }

            .piece {
                width: 18px;
                height: 18px;
            }

            h1 {
                font-size: 1.8em;
            }

            .control-panel {
                width: 100%;
                max-width: 350px;
            }
        }
    </style>
    <script>
        // ========== Game Constants ==========
        const BOARD_SIZE = 15;
        const EMPTY = 0;
        const PLAYER = 1;  // Black pieces
        const AI = 2;      // White pieces

        // ========== Game State Variables ==========
        let board = [];
        let currentPlayer = PLAYER;
        let gameOver = false;
        let difficulty = 'medium';
        let history = [];
        let turnCount = 1;

        // ========== Initialize Board ==========
        function initBoard() {
            // Create empty 15x15 board
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));
            currentPlayer = PLAYER;
            gameOver = false;
            history = [];
            turnCount = 1;
            renderBoard();
            updateStatus();
        }

        // ========== Render Board ==========
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    // Add piece if cell is not empty
                    if (board[row][col] !== EMPTY) {
                        const piece = document.createElement('div');
                        piece.className = board[row][col] === PLAYER ? 'piece black' : 'piece white';
                        cell.appendChild(piece);
                    }

                    cell.addEventListener('click', handleCellClick);
                    boardEl.appendChild(cell);
                }
            }
        }

        // ========== Handle Cell Click ==========
        function handleCellClick(e) {
            // Ignore if game over or not player's turn
            if (gameOver || currentPlayer !== PLAYER) {
                return;
            }

            const cell = e.currentTarget;
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);

            // Check if cell already has a piece
            if (board[row][col] !== EMPTY) {
                return;
            }

            // Place piece
            placePiece(row, col, PLAYER);

            // If game not over, switch to AI turn
            if (!gameOver) {
                currentPlayer = AI;
                updateStatus();
                setTimeout(aiMove, 500);
            }
        }

        // ========== Place Piece ==========
        function placePiece(row, col, player) {
            // Update board array
            board[row][col] = player;

            // Record to history
            history.push({ row, col, player });

            // Render board
            renderBoard();

            // Check for win
            const winResult = checkWin(row, col, player);
            if (winResult) {
                gameOver = true;
                showWinLine(winResult);
                const winner = player === PLAYER ? '玩家' : 'AI';
                showModal('游戏结束', `${winner}获胜!`);
                return;
            }

            // Check for draw (board full)
            if (history.length === BOARD_SIZE * BOARD_SIZE) {
                gameOver = true;
                showModal('游戏结束', '平局!');
                return;
            }

            // Increment turn count for player moves only
            if (player === PLAYER) {
                turnCount++;
                updateStatus();
            }
        }

        // ========== Check Win ==========
        function checkWin(row, col, player) {
            // Directions: horizontal, vertical, diagonal, anti-diagonal
            const directions = [
                { dr: 0, dc: 1 },   // horizontal
                { dr: 1, dc: 0 },   // vertical
                { dr: 1, dc: 1 },   // diagonal
                { dr: 1, dc: -1 }   // anti-diagonal
            ];

            for (const { dr, dc } of directions) {
                let count = 1;
                let startRow = row;
                let startCol = col;
                let endRow = row;
                let endCol = col;

                // Check positive direction
                let r = row + dr;
                let c = col + dc;
                while (
                    r >= 0 && r < BOARD_SIZE &&
                    c >= 0 && c < BOARD_SIZE &&
                    board[r][c] === player
                ) {
                    count++;
                    endRow = r;
                    endCol = c;
                    r += dr;
                    c += dc;
                }

                // Check negative direction
                r = row - dr;
                c = col - dc;
                while (
                    r >= 0 && r < BOARD_SIZE &&
                    c >= 0 && c < BOARD_SIZE &&
                    board[r][c] === player
                ) {
                    count++;
                    startRow = r;
                    startCol = c;
                    r -= dr;
                    c -= dc;
                }

                // Win condition: 5 or more in a row
                if (count >= 5) {
                    return {
                        start: { row: startRow, col: startCol },
                        end: { row: endRow, col: endCol },
                        direction: { dr, dc }
                    };
                }
            }

            return null;
        }

        // ========== Show Win Line ==========
        function showWinLine(result) {
            const boardEl = document.getElementById('board');
            const cellSize = 30;

            // Calculate line position and dimensions
            const startX = result.start.col * cellSize + cellSize / 2;
            const startY = result.start.row * cellSize + cellSize / 2;
            const endX = result.end.col * cellSize + cellSize / 2;
            const endY = result.end.row * cellSize + cellSize / 2;

            const length = Math.sqrt(
                Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2)
            );
            const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;

            const line = document.createElement('div');
            line.className = 'win-line';
            line.style.left = `${startX}px`;
            line.style.top = `${startY - 2}px`;
            line.style.width = `${length}px`;
            line.style.transform = `rotate(${angle}deg)`;

            boardEl.appendChild(line);
        }

        // ========== Update Status ==========
        function updateStatus() {
            const playerIcon = document.querySelector('.player-icon');
            const playerText = document.querySelector('.player-info span:last-child');
            const turnText = document.querySelector('.turn-text');

            if (currentPlayer === PLAYER) {
                playerIcon.style.background = 'radial-gradient(circle, #555, #111)';
                playerText.textContent = '当前: 玩家';
            } else {
                playerIcon.style.background = 'radial-gradient(circle, #fff, #ccc)';
                playerText.textContent = '当前: AI';
            }

            turnText.textContent = `回合 ${turnCount}`;
        }

        // ========== Show Modal ==========
        function showModal(title, message) {
            const modal = document.getElementById('modal');
            const modalTitle = modal.querySelector('h2');
            const modalMessage = document.getElementById('modal-message');

            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modal.classList.add('show');
        }

        // ========== Undo Move ==========
        function undoMove() {
            // Cannot undo during AI turn or if no moves to undo
            if (currentPlayer !== PLAYER || history.length < 2) {
                return;
            }

            // Undo two moves (player's and AI's)
            for (let i = 0; i < 2 && history.length > 0; i++) {
                const lastMove = history.pop();
                board[lastMove.row][lastMove.col] = EMPTY;
            }

            // Decrease turn count
            turnCount = Math.max(1, turnCount - 1);

            // Re-render and update status
            renderBoard();
            updateStatus();
        }

        // ========== AI Evaluation Constants ==========
        const SCORES = {
            FIVE: 100000,
            LIVE_FOUR: 10000,
            RUSH_FOUR: 1000,
            LIVE_THREE: 500,
            SLEEP_THREE: 100,
            LIVE_TWO: 50,
            SLEEP_TWO: 10,
            LIVE_ONE: 2
        };

        // ========== Count consecutive pieces ==========
        function countConsecutive(row, col, dr, dc, player) {
            let count = 0;
            let openEnds = 0;
            let r, c;

            // Count in positive direction
            r = row + dr;
            c = col + dc;
            let posCount = 0;
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
                posCount++;
                r += dr;
                c += dc;
            }
            if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === EMPTY) {
                openEnds++;
            }

            // Count in negative direction
            r = row - dr;
            c = col - dc;
            let negCount = 0;
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
                negCount++;
                r -= dr;
                c -= dc;
            }
            if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === EMPTY) {
                openEnds++;
            }

            count = posCount + negCount + 1; // +1 for the current piece
            return { count, openEnds };
        }

        // ========== Evaluate position score ==========
        function evaluatePositionScore(row, col, player) {
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
            let totalScore = 0;

            for (const [dr, dc] of directions) {
                const { count, openEnds } = countConsecutive(row, col, dr, dc, player);

                if (count >= 5) {
                    totalScore += SCORES.FIVE;
                } else if (count === 4) {
                    if (openEnds === 2) totalScore += SCORES.LIVE_FOUR;
                    else if (openEnds === 1) totalScore += SCORES.RUSH_FOUR;
                } else if (count === 3) {
                    if (openEnds === 2) totalScore += SCORES.LIVE_THREE;
                    else if (openEnds === 1) totalScore += SCORES.SLEEP_THREE;
                } else if (count === 2) {
                    if (openEnds === 2) totalScore += SCORES.LIVE_TWO;
                    else if (openEnds === 1) totalScore += SCORES.SLEEP_TWO;
                } else if (count === 1 && openEnds >= 1) {
                    totalScore += SCORES.LIVE_ONE;
                }
            }

            return totalScore;
        }

        // ========== Has Neighbor ==========
        function hasNeighbor(row, col) {
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const r = row + dr;
                    const c = col + dc;
                    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] !== EMPTY) {
                        return true;
                    }
                }
            }
            return false;
        }

        // ========== Get best move for AI ==========
        function getBestMove() {
            let bestScore = -Infinity;
            let bestMoves = [];

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === EMPTY && hasNeighbor(row, col)) {
                        // Simulate AI move
                        board[row][col] = AI;
                        let aiScore = 0;
                        for (let r = 0; r < BOARD_SIZE; r++) {
                            for (let c = 0; c < BOARD_SIZE; c++) {
                                if (board[r][c] === AI) {
                                    aiScore += evaluatePositionScore(r, c, AI);
                                }
                            }
                        }
                        board[row][col] = EMPTY;

                        // Simulate player response
                        board[row][col] = PLAYER;
                        let playerScore = 0;
                        for (let r = 0; r < BOARD_SIZE; r++) {
                            for (let c = 0; c < BOARD_SIZE; c++) {
                                if (board[r][c] === PLAYER) {
                                    playerScore += evaluatePositionScore(r, c, PLAYER);
                                }
                            }
                        }
                        board[row][col] = EMPTY;

                        const totalScore = aiScore + playerScore;

                        if (totalScore > bestScore) {
                            bestScore = totalScore;
                            bestMoves = [{ row, col }];
                        } else if (totalScore === bestScore) {
                            bestMoves.push({ row, col });
                        }
                    }
                }
            }

            if (bestMoves.length === 0) {
                // Fallback to center
                const center = Math.floor(BOARD_SIZE / 2);
                if (board[center][center] === EMPTY) {
                    return { row: center, col: center };
                }
                // Find any empty cell
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (board[r][c] === EMPTY) {
                            return { row: r, col: c };
                        }
                    }
                }
                return null;
            }

            return bestMoves[Math.floor(Math.random() * bestMoves.length)];
        }

        // ========== AI Move ==========
        function aiMove() {
            if (gameOver) return;

            const move = getBestMove();
            console.log('AI move:', move);

            if (move) {
                placePiece(move.row, move.col, AI);
            } else {
                console.log('ERROR: No valid move found!');
            }

            if (!gameOver) {
                currentPlayer = PLAYER;
                updateStatus();
            }
        }

        // ========== DOMContentLoaded ==========
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize game
            initBoard();

            // Difficulty selector buttons
            const diffButtons = document.querySelectorAll('.diff-btn');
            diffButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    diffButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    difficulty = btn.dataset.level;
                    console.log('Difficulty changed to:', difficulty);
                });
            });

            // Restart button
            document.querySelectorAll('.action-btn').forEach(btn => {
                if (btn.textContent === '重新开始') {
                    btn.addEventListener('click', initBoard);
                } else if (btn.textContent === '悔棋') {
                    btn.addEventListener('click', undoMove);
                }
            });

            // Modal restart button
            document.getElementById('modal-close').addEventListener('click', () => {
                document.getElementById('modal').classList.remove('show');
                initBoard();
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <h1>CYBER GOMOKU</h1>
        <p class="subtitle">// NEURAL NETWORK BATTLE //</p>

        <div class="game-wrapper">
            <div class="control-panel">
                <div class="difficulty-selector">
                    <button class="diff-btn" data-level="easy">简单</button>
                    <button class="diff-btn active" data-level="medium">中等</button>
                    <button class="diff-btn" data-level="hard">困难</button>
                </div>

                <div class="status-bar">
                    <div class="player-info">
                        <span class="player-icon"></span>
                        <span>当前: 玩家</span>
                    </div>
                    <div class="turn-indicator">
                        <span class="turn-text">回合 1</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn">悔棋</button>
                    <button class="action-btn">重新开始</button>
                </div>
            </div>

            <div class="board-container">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>游戏结束</h2>
            <p id="modal-message">胜利者</p>
            <button id="modal-close">继续</button>
        </div>
    </div>
</body>
</html>
